name: register-protocol

# Protocol mode: HTTP signup + Build OAuth + probe (no browser UI).
# Captcha: local Camoufox turnstile-solver (default :5072), NOT YesCaptcha.
# Requires secrets: PROXY_URL, TEMPMAIL_BASE_URL
# Optional: SCHEDULER_* for frontend upload

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Accounts to register"
        required: true
        default: "1"
      domains:
        description: "Tempmail domains (comma-separated)"
        required: false
        default: "mtoosov.shop,olsbvgq.shop,htazmbb.shop,cabuhu.cn,pfdszfg.shop,tnfolpr.shop,xiiktcx.cn"

jobs:
  protocol-register:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Camoufox / display)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb ca-certificates fonts-liberation fonts-noto-cjk \
            libgtk-3-0 libx11-xcb1 libasound2 || true

      - name: Setup uv / Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install project
        run: uv sync

      - name: Install + start local Camoufox turnstile solver
        run: |
          cd turnstile-solver
          python -m venv .venv
          .venv/bin/pip install -U pip setuptools wheel
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python -m camoufox fetch || true
          mkdir -p logs
          nohup .venv/bin/python api_solver.py \
            --browser_type camoufox --thread 1 --host 127.0.0.1 --port 5072 \
            > logs/solver.log 2>&1 &
          echo $! > logs/solver.pid
          # wait health
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5072/health >/dev/null 2>&1; then
              echo "local solver ready"
              curl -sS http://127.0.0.1:5072/health || true
              exit 0
            fi
            sleep 2
          done
          echo "solver failed to start"; tail -50 logs/solver.log || true; exit 1

      - name: Write config
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          TEMPMAIL_BASE_URL: ${{ secrets.TEMPMAIL_BASE_URL }}
          TEMPMAIL_DOMAINS: ${{ inputs.domains }}
        run: |
          python <<'PY'
          import json, os, re
          cfg = json.load(open("config.example.json", encoding="utf-8"))
          cfg["proxy"] = os.environ.get("PROXY_URL") or ""
          if os.environ.get("TEMPMAIL_BASE_URL"):
              cfg["tempmail_base_url"] = os.environ["TEMPMAIL_BASE_URL"]
          cfg["browser_engine"] = "protocol"
          cfg["captcha_provider"] = "local"
          cfg["local_solver_url"] = "http://127.0.0.1:5072"
          cfg["protocol_build_oauth"] = True
          cfg["register_count"] = int("${{ inputs.count }}" or "1")
          cfg["grok2api_auto_add_remote"] = False
          raw = (os.environ.get("TEMPMAIL_DOMAINS") or "").strip()
          default_domains = ["mtoosov.shop", "olsbvgq.shop", "htazmbb.shop", "cabuhu.cn", "pfdszfg.shop", "tnfolpr.shop", "xiiktcx.cn"]
          domains = []
          if raw:
              for part in re.split(r"[,;\s]+", raw):
                  d = part.strip().lower().lstrip("@")
                  if d and d not in domains:
                      domains.append(d)
          cfg["tempmail_domains"] = domains or default_domains
          json.dump(cfg, open("config.json", "w", encoding="utf-8"), indent=2)
          print("protocol config captcha=local domains=%s" % cfg["tempmail_domains"])
          PY

      - name: Run protocol register
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          TEMPMAIL_DOMAINS: ${{ inputs.domains }}
          LOCAL_SOLVER_URL: http://127.0.0.1:5072
          YESCAPTCHA_ENDPOINT: http://127.0.0.1:5072
        run: xvfb-run -a uv run python -m grokreg protocol-run --count ${{ inputs.count }}

      - name: Build importable + upload scheduler
        if: always()
        env:
          SCHEDULER_URL: ${{ secrets.SCHEDULER_URL }}
          SCHEDULER_USER: ${{ secrets.SCHEDULER_USER }}
          SCHEDULER_PASS: ${{ secrets.SCHEDULER_PASS }}
          SCHEDULER_TOKEN: ${{ secrets.SCHEDULER_TOKEN }}
        run: |
          python <<'PY'
          import json, os, pathlib, sys, urllib.error, urllib.request
          side = pathlib.Path("importable.jsonl")
          lines = []
          if side.exists():
              for line in side.read_text(encoding="utf-8").splitlines():
                  try:
                      it = json.loads(line)
                  except Exception:
                      continue
                  it.setdefault("source", "gha-protocol")
                  tags = list(it.get("tags") or [])
                  for t in ("protocol", "gha", "no-upload"):
                      if t not in tags:
                          tags.append(t)
                  it["tags"] = tags
                  lines.append(it)
          pathlib.Path("importable.json").write_text(
              json.dumps(lines, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          print("importable", len(lines))
          base = (os.environ.get("SCHEDULER_URL") or "").rstrip("/")
          if not base or not lines:
              print("skip scheduler upload")
              sys.exit(0)
          def req(method, url, data=None, token=""):
              body = None if data is None else json.dumps(data).encode()
              h = {"Content-Type": "application/json"}
              if token:
                  h["Authorization"] = f"Bearer {token}"
              r = urllib.request.Request(url, data=body, headers=h, method=method)
              with urllib.request.urlopen(r, timeout=60) as resp:
                  return json.loads(resp.read().decode() or "{}")
          token = (os.environ.get("SCHEDULER_TOKEN") or "").strip()
          if not token:
              login = req("POST", f"{base}/api/auth/login", {
                  "username": os.environ.get("SCHEDULER_USER") or "admin",
                  "password": os.environ.get("SCHEDULER_PASS") or "",
              })
              token = login.get("token") or ""
          if not token:
              print("no scheduler token")
              sys.exit(0)
          payload = {"accounts": [{
              "email": a.get("email") or "",
              "password": a.get("password") or "",
              "sso": a.get("sso") or "",
              "access_token": a.get("access_token") or "",
              "refresh_token": a.get("refresh_token") or "",
              "id_token": a.get("id_token") or "",
              "probe_status": int(a.get("probe_status") or 200),
              "probe_detail": a.get("probe_detail") or "probe_ok",
              "tags": a.get("tags") or ["protocol"],
              "source": a.get("source") or "gha-protocol",
          } for a in lines]}
          res = req("POST", f"{base}/api/accounts/import", payload, token=token)
          print("import", res)
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: protocol-register-${{ github.run_id }}
          path: |
            results.jsonl
            accounts.txt
            importable.json
            importable.jsonl
            g2a_auth/
          if-no-files-found: warn
